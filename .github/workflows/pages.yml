name: Deploy web app to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Validate static site structure
        run: python3 scripts/validate_site.py

      - name: Build automated version log
        run: VERSION_LOG_INCLUDE_DIRTY=0 python3 scripts/build_version_log.py

      - name: Upload static web folder
        uses: actions/upload-pages-artifact@v5
        with:
          path: web
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
